language: generic

services:
  - docker

before_install:
  - docker --version
  - docker compose version || docker-compose --version

script:
  - docker build --target build -t api-productos-build .
  - docker build -t api-productos:travis .
  - docker compose up -d || docker-compose up -d
  - docker ps
  - sleep 15
  - docker compose ps || docker-compose ps

after_script:
  - docker compose down || docker-compose down