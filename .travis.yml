language: csharp

mono: none

dotnet: 8.0.100

os: linux

dist: jammy
 
services:

  - docker
 
# Variables: base de datos de prueba para que los tests puedan correr

env:

  global:

    - DOTNET_CLI_TELEMETRY_OPTOUT=1

    - ASPNETCORE_ENVIRONMENT=Development
 
install:

  - dotnet restore TaskManagerApi/TaskManagerApi.csproj
 
script:

  # Compilar

  - dotnet build TaskManagerApi/TaskManagerApi.csproj -c Release --no-restore

  # Ejecutar tests (si los hay; si no, no falla)

  - dotnet test || echo "No hay proyectos de test, se omite"

  # Construir la imagen Docker para verificar que el Dockerfile funciona

  - docker build -t taskmanager-api:latest .
 