language: minimal
 
services:
  - docker
 
# Etapas del pipeline
jobs:
  include:
    - stage: build
      script:
        # Construir la imagen con tu Dockerfile
        - docker build -t taskmanagerapi .
 
    - stage: test
      script:
        # Ejecutar la imagen y correr pruebas
        - docker run -d -p 8080:8080 --name taskmanagerapi taskmanagerapi
        # Aquí puedes añadir comandos para validar que el contenedor está corriendo
        # Por ejemplo, usar curl para verificar el endpoint de salud
        - docker ps
        - curl http://localhost:8080/health || true
 
    - stage: deploy
      script:
        # Aquí defines tu despliegue (ejemplo: push a DockerHub)
        - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
        - docker tag taskmanagerapi $DOCKER_USERNAME/taskmanagerapi:latest
        - docker push $DOCKER_USERNAME/taskmanagerapi:latest